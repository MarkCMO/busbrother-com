name = "busbrother-cron"
main = "index.js"
compatibility_date = "2026-04-01"

# Daily 13:00 UTC (8am ET DST / 9am ET EST)     — fires /api/trip-reminders
# Fridays 13:00 UTC (8am ET DST / 9am ET EST)   — fires /api/weekly-digest
[triggers]
crons = ["0 13 * * *", "0 13 * * 5"]

# Vars set via:  npx wrangler secret put BUSBROTHER_ADMIN_SECRET
# Required secrets:
#   BUSBROTHER_ADMIN_SECRET   - same value as configured on the Pages site
#
# Public vars (not secret) live here:
[vars]
TRIP_REMINDERS_URL = "https://busbrother.com/api/trip-reminders"
WEEKLY_DIGEST_URL  = "https://busbrother.com/api/weekly-digest"
