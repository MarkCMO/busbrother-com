[build]
  command = "node build.js"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Schedule configured via Netlify dashboard instead of toml for CLI deploy compatibility
# [functions.trip-reminders]
#   schedule = "0 8 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── API Function Routes ──────────────────────────
[[redirects]]
  from = "/api/job-view"
  to = "/.netlify/functions/job-view"
  status = 200

[[redirects]]
  from = "/api/bid-submit"
  to = "/.netlify/functions/bid-submit"
  status = 200

[[redirects]]
  from = "/api/jobs-admin"
  to = "/.netlify/functions/jobs-admin"
  status = 200

[[redirects]]
  from = "/api/square-webhook"
  to = "/.netlify/functions/square-webhook"
  status = 200

